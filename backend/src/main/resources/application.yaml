spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/cinefy
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true

    flyway:
      enabled: true